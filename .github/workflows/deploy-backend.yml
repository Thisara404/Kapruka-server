name: Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  DEPLOY_DIR: ${{ vars.BACKEND_DEPLOY_DIR || '/opt/kapruka/backend' }}

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/kapruka-backend" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --push \
            --tag "$IMAGE_NAME:latest" \
            --tag "$IMAGE_NAME:${GITHUB_SHA}" \
            .

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_KEY }}
          SSH_HOST: ${{ secrets.VM_HOST }}
          SSH_USER: ${{ secrets.VM_USER }}
          SSH_PORT: ${{ secrets.VM_PORT || '22' }}
        run: |
          set -euo pipefail

          install -m 600 /dev/null /tmp/deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/deploy_key

          # ServerAliveInterval keeps the long-running docker load pipe from
          # being killed by SSH idle timeouts on the VM or intermediate firewalls.
          SSH_OPTS="-i /tmp/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -p ${SSH_PORT}"
          REMOTE="${SSH_USER}@${SSH_HOST}"
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"

          # Ensure deploy directory exists and upload compose file
          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p '${DEPLOY_DIR}'"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -P "${SSH_PORT}" \
              docker-compose.yml "${REMOTE}:${DEPLOY_DIR}/docker-compose.yml"

          # --platform linux/amd64 pulls only the single-arch manifest, not the
          # attestation-bearing manifest list. docker save on a manifest list can
          # silently produce an empty/partial stream with older buildx images,
          # which causes docker load on the VM to receive EOF from the daemon.
          docker pull --platform linux/amd64 "${IMAGE_NAME}:latest"

          # Stream image via SSH. -C enables SSH-level compression (replaces the
          # manual gzip|ssh|gzip-d pipe which hid docker save errors and added a
          # second failure point). pipefail above ensures docker save failures
          # are caught rather than silently piped as empty streams.
          docker save "${IMAGE_NAME}:latest" | \
            ssh -C ${SSH_OPTS} "${REMOTE}" 'docker load'

          # Restart the container; IMAGE_NAME is expanded on the runner so the
          # remote shell receives the literal resolved value.
          ssh ${SSH_OPTS} "${REMOTE}" "
            set -eu
            cd '${DEPLOY_DIR}'
            printf 'BACKEND_IMAGE=%s\n' '${IMAGE_NAME}:latest' > .image.env
            docker compose --env-file .image.env up -d --remove-orphans
            docker image prune -f
          "

          rm -f /tmp/deploy_key
