name: Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  DEPLOY_DIR: ${{ vars.BACKEND_DEPLOY_DIR || '/opt/kapruka/backend' }}

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/kapruka-backend" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --push \
            --tag "$IMAGE_NAME:latest" \
            --tag "$IMAGE_NAME:${GITHUB_SHA}" \
            .

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_KEY }}
          SSH_HOST: ${{ secrets.VM_HOST }}
          SSH_USER: ${{ secrets.VM_USER }}
          SSH_PORT: ${{ secrets.VM_PORT || '22' }}
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/deploy_key

          SSH_OPTS="-i /tmp/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p ${SSH_PORT}"
          REMOTE="${SSH_USER}@${SSH_HOST}"
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"

          # Ensure deploy directory exists and upload compose file
          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p '${DEPLOY_DIR}'"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -P "${SSH_PORT}" \
              docker-compose.yml "${REMOTE}:${DEPLOY_DIR}/docker-compose.yml"

          # Pull image on the runner (which has GHCR access), then stream it to
          # the VM over the existing SSH pipe. The VM never contacts ghcr.io.
          docker pull "${IMAGE_NAME}:latest"
          docker save "${IMAGE_NAME}:latest" | gzip | \
            ssh ${SSH_OPTS} "${REMOTE}" 'gzip -d | docker load'

          # Restart the container; IMAGE_NAME is expanded here on the runner,
          # so the remote shell receives the literal resolved value.
          ssh ${SSH_OPTS} "${REMOTE}" "
            set -eu
            cd '${DEPLOY_DIR}'
            printf 'BACKEND_IMAGE=%s\n' '${IMAGE_NAME}:latest' > .image.env
            docker compose --env-file .image.env up -d --remove-orphans
            docker image prune -f
          "

          rm -f /tmp/deploy_key
