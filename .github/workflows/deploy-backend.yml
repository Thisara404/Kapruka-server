name: Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  DEPLOY_DIR: ${{ vars.BACKEND_DEPLOY_DIR || '/opt/kapruka/backend' }}

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/kapruka-backend" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --push \
            --tag "$IMAGE_NAME:latest" \
            --tag "$IMAGE_NAME:${GITHUB_SHA}" \
            .

      - name: Ensure backend deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script_stop: true
          script: mkdir -p "${{ env.DEPLOY_DIR }}"

      - name: Upload backend compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true

      - name: Pull and restart backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          envs: IMAGE_NAME
          script_stop: true
          script: |
            set -eu
            cd "${{ env.DEPLOY_DIR }}"
            printf 'BACKEND_IMAGE=%s\n' "$IMAGE_NAME:latest" > .image.env
            docker compose --env-file .image.env pull
            docker compose --env-file .image.env up -d --remove-orphans
            docker image prune -f
