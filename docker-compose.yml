name: kapruka-backend

services:
  kapruka-backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .image.env}
    container_name: kapruka-backend
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
